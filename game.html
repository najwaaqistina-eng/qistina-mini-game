<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Challenge | Qistina Najwa</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    /* Tema pastel blue yang lembut dan ceria sepadan dengan fail portfolio yang lain */
    background: linear-gradient(135deg, #eef2ff 0%, #93c5fd 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* NAVBAR (Kekal standard untuk interconnecting link portfolio awak) */
nav {
    background: #1e293b;
    padding: 18px;
    box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
    width: 100%;
}

nav ul {
    display: flex;
    justify-content: center;
    list-style: none;
    gap: 35px;
}

nav a {
    color: #e2e8f0;
    text-decoration: none;
    font-weight: 600;
    letter-spacing: 0.5px;
    transition: all 0.3s ease;
}

nav a:hover {
    color: #38bdf8;
    text-shadow: 0 0 8px rgba(56, 189, 248, 0.4);
    transform: translateY(-2px);
}

/* MAIN GAME SECTION */
section {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
}

.game-container {
    width: 100%;
    max-width: 650px;
    background: white;
    padding: 40px 30px;
    border-radius: 24px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(147, 197, 253, 0.3);
    border: 1px solid rgba(147, 197, 253, 0.4);
}

.game-container h1 {
    font-size: 2.3rem;
    font-weight: 700;
    color: #1e3a8a; /* Biru gelap tulisan tajuk */
    margin-bottom: 5px;
}

#countdown {
    color: #64748b;
    font-size: 1.05rem;
    margin-bottom: 5px;
    font-weight: 500;
}

/* STATS BAR */
.stats {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 25px 0;
    flex-wrap: wrap;
}

.stat {
    background: #f1f5f9;
    padding: 12px 20px;
    border-radius: 12px;
    min-width: 120px;
    border: 1px solid #e2e8f0;
    color: #475569;
    font-size: 0.9rem;
    font-weight: 600;
}

.stat b {
    font-size: 1.4rem;
    color: #2563eb; /* Rona biru utama */
}

/* PROGRESS BAR */
.progress {
    width: 100%;
    height: 12px;
    background: #e2e8f0;
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 30px;
}

#progressBar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #60a5fa, #3b82f6);
    transition: width 0.3s ease;
}

/* GAME BOARD GRID */
#gameBoard {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
    max-width: 480px;
    margin: 0 auto;
}

.card {
    height: 100px;
    background: #334155; /* Warna belakang kad asal */
    border-radius: 14px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 40px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.card:hover {
    transform: scale(1.04);
    background: #475569;
}

.card.flipped {
    background: #f0f5ff;
    color: black;
}

.card.matched {
    background: #10b981; /* Warna hijau pastel bila betul */
    color: white;
    pointer-events: none;
}

/* RESTART BUTTON */
.btn-restart {
    padding: 12px 30px;
    background: linear-gradient(135deg, #60a5fa, #3b82f6);
    border: none;
    color: white;
    font-weight: 700;
    font-size: 1rem;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 25px;
    box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
}

.btn-restart:hover {
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(59, 130, 246, 0.3);
}

footer {
    background: #1e293b;
    color: #94a3b8;
    text-align: center;
    padding: 20px;
    font-size: 0.9rem;
}

@media(max-width: 768px){
    #gameBoard {
        gap: 10px;
    }
    .card {
        height: 85px;
        font-size: 30px;
    }
}
</style>
</head>
<body>

<nav>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="game.html">Game</a></li>
    </ul>
</nav>

<section>
    <div class="game-container">
        <h1>📡 Memory Challenge</h1>
        <p id="countdown">Memorize the cards...</p>

        <div class="stats">
            <div class="stat">
                Moves<br>
                <b id="moves">0</b>
            </div>
            <div class="stat">
                Matches<br>
                <b id="matches">0/8</b>
            </div>
            <div class="stat">
                Time<br>
                <b id="timer">0</b>s
            </div>
        </div>

        <div class="progress">
            <div id="progressBar"></div>
        </div>

        <div id="gameBoard"></div>

        <button class="btn-restart" onclick="location.reload()">
            Restart Game
        </button>
    </div>
</section>

<footer>
    © 2026 Personal Portfolio Website
</footer>

<script>
const symbols=[
'📡','📡',
'📱','📱',
'💡','💡',
'🔋','🔋',
'📷','📷',
'🛰️','🛰️',
'🤖','🤖',
'📶','📶'
];

symbols.sort(()=>Math.random()-0.5);

const board=document.getElementById("gameBoard");

let firstCard=null;
let secondCard=null;
let lockBoard=false;
let moves=0;
let matches=0;
let previewMode=true;
let seconds=0;

symbols.forEach(symbol=>{
    const card=document.createElement("div");
    card.classList.add("card");
    card.dataset.symbol=symbol;
    card.innerHTML=symbol;
    card.classList.add("flipped");
    card.addEventListener("click",flipCard);
    board.appendChild(card);
});

function flipCard(){
    if(previewMode)return;
    if(lockBoard)return;
    if(this===firstCard)return;

    this.innerHTML=this.dataset.symbol;
    this.classList.add("flipped");

    if(!firstCard){
        firstCard=this;
        return;
    }

    secondCard=this;
    moves++;
    document.getElementById("moves").innerHTML=moves;
    checkMatch();
}

function checkMatch(){
    if(firstCard.dataset.symbol===secondCard.dataset.symbol){
        firstCard.classList.add("matched");
        secondCard.classList.add("matched");
        matches++;
        document.getElementById("matches").innerHTML=matches+"/8";
        document.getElementById("progressBar").style.width=(matches/8)*100+"%";

        firstCard=null;
        secondCard=null;

        if(matches===8){
            alert("Congratulations!");
        }
    }else{
        lockBoard=true;
        setTimeout(()=>{
            firstCard.innerHTML="?";
            secondCard.innerHTML="?";
            firstCard.classList.remove("flipped");
            secondCard.classList.remove("flipped");
            firstCard=null;
            secondCard=null;
            lockBoard=false;
        },1000);
    }
}

let countdown=5;
const preview=setInterval(()=>{
    document.getElementById("countdown").innerHTML="Memorize the cards : "+countdown+"s";
    countdown--;

    if(countdown<0){
        clearInterval(preview);
        document.querySelectorAll(".card").forEach(card=>{
            card.innerHTML="?";
            card.classList.remove("flipped");
        });
        previewMode=false;
        document.getElementById("countdown").innerHTML="Game Started!";
    }
},1000);

setInterval(()=>{
    if(!previewMode){
        seconds++;
        document.getElementById("timer").innerHTML=seconds;
    }
},1000);
</script>

</body>
</html>
